  summary: 'National Social Security Fund Act, Cap. 50, First Schedule: statutory contributions of Twenty cents for every complete shilling of wages (20% of wages total), of which Ten cents for every complete shilling (10%) is the employee share and the remaining ten cents (10%) is the employer share. NSSF contribution instrument (TAZMOD tscee02/tscer02).'
