  source_verification:
    corpus_citation_path: tz/statute/cap-148/value-added-tax-act
    source_sha256: 5bb2062846499dd42d6704766238f9ee72f07e93c8722cd4095d7d958e77eab7
  summary: “The amount of value added tax payable shall be calculated by multiplying
    the value of the supply or import by the value added tax rate, which shall be
    eighteen percent.” “Where the supply or import is zero-rated, the value added
    tax rate shall be zero percent.”
