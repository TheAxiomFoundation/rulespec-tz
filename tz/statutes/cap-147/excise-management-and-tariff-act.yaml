format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: tz/statute/cap-147/excise-management-and-tariff-act
  summary: 'Excise (Management and Tariff) Act, Cap. 147, Fourth Schedule specific excise rates as amended by the Finance Acts. TZ_2023 (TAZMOD convention uses Finance Act 2023 rates from 1 July 2023): beer 918.00/litre, cigarettes 35,310.00/thousand, unmanufactured tobacco 33,878.88/kg, wine 2,466.45/litre (Finance Act 2023); spirits 3,978/litre and grape-wine spirits 4,386/litre (Finance Act 2021, unchanged). Petrol/diesel fuel excise and fuel toll require the Roads and Fuel Tolls Act (Cap. 220), not in the bound release (see data/coverage/awaiting-source-recovery.json). TAZMOD excise instrument (tex).'
rules:
