  kind: parameter
  dtype: Money
  unit: TZS
  source: Excise (Management and Tariff) Act Cap. 147 Fourth Schedule, as amended
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: tz/statute/act-2023-7/finance-act-2023
          excerpt: Tshs. 918.00 per litre
  versions:
  - effective_from: '2023-07-01'
    formula: '918'
