    period_kind: tax_year
    start: '2023-07-01'
    end: '2024-06-30'
  input:
    tz:statutes/cap-332/income-tax-act#input.resident_individual_total_income: 3000000
    tz:statutes/cap-50/national-social-security-fund-act#input.wages: 3000000
    tz:statutes/composed/tz-2023-disposable-income-pipeline#input.benefits_received: 0
