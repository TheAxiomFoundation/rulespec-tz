format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: tz/statute/cap-332/income-tax-act
    source_sha256: 4792c5e231d68fb513b285e31c8de15c18725a346ea332008cb43bd765b35422
  summary: 'Income Tax Act, Cap. 332 R.E. 2023. First Schedule paragraph 1(1): the annual income tax on a resident individual''s total income by bands (3,240,000/6,240,000/9,120,000/12,000,000 at 0/8/20/25/30%, cumulative base 0/0/240,000/816,000/1,536,000). Second Schedule (First Schedule paragraph 2): presumptive income tax on the business turnover of a resident individual whose income is exclusively business income with a source in the United Republic and whose turnover does not exceed 100,000,000 - NIL up to 4,000,000; 3% of the excess to 7,000,000; 90,000 plus 3% to 11,000,000; 3.5% of turnover to 100,000,000 - with a separate fixed-amount column where section 43 of the Tax Administration Act is not complied with. Resident-individual PAYE (TAZMOD tin) + presumptive turnover tax (TAZMOD ttn).'
rules:
- name: resident_individual_income_tax_band
  kind: derived
  entity: Person
  dtype: Integer
  period: Year
  source: First Schedule paragraph 1(1)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter_table
        source:
          corpus_citation_path: tz/statute/cap-332/income-tax-act
          table:
            header: Rates of income tax for individuals
            row_key: total income bands
            column_key: band thresholds
  versions:
  - effective_from: '2020-07-01'
    formula: 'if resident_individual_total_income <= resident_individual_band_0_upper_bound: 0 else: if resident_individual_total_income <= resident_individual_band_1_upper_bound: 1 else: if resident_individual_total_income <= resident_individual_band_2_upper_bound: 2 else: if resident_individual_total_income <= resident_individual_band_3_upper_bound: 3 else: 4'
