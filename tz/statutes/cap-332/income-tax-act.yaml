- name: presumptive_income_tax_on_business_turnover_second_schedule
  kind: derived
  entity: Person
  dtype: Money
  period: Year
  unit: TZS
  source: First Schedule paragraph 2(1)-(3)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: predicate
        source:
          corpus_citation_path: tz/statute/cap-332/income-tax-act
          excerpt: the individual’s income for a year of income consists exclusively of income from a business
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: tz/statute/cap-332/income-tax-act
          excerpt: the individual’s income tax payable with respect to section 4(1)(a) for the year of income shall be equal to the amount of presumptive income tax provided in subparagraph (3)
  versions:
  - effective_from: '2020-07-01'
    formula: |-
      if resident_individual
         and business_income_exclusively_qualifying_for_presumptive_tax
         and business_income_has_source_in_united_republic
         and business_turnover <= presumptive_income_tax_turnover_threshold
         and not individual_elects_to_disapply_presumptive_income_tax
         and presumptive_turnover_band != -1:
        if section_43_of_tax_administration_act_is_complied_with:
          presumptive_compliant_fixed_tax[presumptive_turnover_band] + presumptive_compliant_marginal_rate[presumptive_turnover_band] * max(0, business_turnover - presumptive_compliant_excess_base[presumptive_turnover_band])
        else:
          presumptive_noncompliant_fixed_tax[presumptive_turnover_band] + presumptive_noncompliant_marginal_rate[presumptive_turnover_band] * max(0, business_turnover - presumptive_noncompliant_excess_base[presumptive_turnover_band])
      else:
        0
