    formula: 'monthly_foundational_cash_transfer + (if household_participates_in_public_works: public_works_monthly_transfer_amount else: 0)'
- name: livelihood_grant_payable
  kind: derived
  entity: Household
  dtype: Money
  period: Month
  unit: TZS
  source: tz/policy/tasaf-pssn/pssn-ii-benefit-structure
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: tz/policy/tasaf-pssn/pssn-ii-benefit-structure
          excerpt: will not exceed TZS 500,000
  versions:
  - effective_from: '2019-08-16'
    formula: 'if household_approved_for_livelihood_grant: min(requested_livelihood_grant_amount, livelihood_grant_maximum) else: 0'
