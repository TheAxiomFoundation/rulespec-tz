format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: tz/policy/tasaf-pssn/pssn-ii-benefit-structure
    source_sha256: 6df512a6ccd7ec81af5200489a4201a1318f6d429b40c380e8c100401a8cdfba
  summary: |-
    “Under the revised benefit structure a beneficiary household would receive a minimum of TZS 12,000 and a maximum of TZS 55,000 per month depending on the structure and compliance.” Table 2 specifies the fixed transfer, child and disability grants, human-capital transfers, public-works transfer, and livelihood grant.
  deferred_outputs:
    - output: tz:policies/tasaf-pssn/pssn-ii-benefit-structure/b#goods_works_services_training_and_operating_costs
      reason: The cited financing-category subparagraph (b) allocates project financing for goods, works, services, training, and operating costs rather than defining a household benefit, eligibility condition, or other supported benefit-unit computation.

rules:
