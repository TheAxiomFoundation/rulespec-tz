      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: tz/policy/tasaf-pssn/pssn-ii-benefit-structure
              excerpt: "Fixed Direct support/ Productive transfer* 12,000"
    versions:
      - effective_from: '2019-08-16'
        formula: |-
          12000

