              excerpt: "daily transfer rate will be 3,000 TZS"
    versions:
      - effective_from: '2019-08-16'
        formula: |-
          3000

  - name: standard_public_works_payment_days
    kind: parameter
    dtype: Count
    source: PSSN II Table 2, Public Works transfer
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: tz/policy/tasaf-pssn/pssn-ii-benefit-structure
              excerpt: "Public Works transfer 3000*10 = 30,000"
    versions:
      - effective_from: '2019-08-16'
        formula: |-
          10

  - name: maximum_livelihood_grant
    kind: parameter
    dtype: Money
    unit: TZS
    source: PSSN II paragraph 44 and Table 2, Livelihood grant
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: tz/policy/tasaf-pssn/pssn-ii-benefit-structure
              excerpt: "will not exceed TZS 500,000"
    versions:
      - effective_from: '2019-08-16'
        formula: |-
          500000

  - name: monthly_cash_transfer
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: TZS
    source: PSSN II paragraphs 32-33 and Table 2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: tz/policy/tasaf-pssn/pssn-ii-benefit-structure
              excerpt: "CTs will comprise three types of benefits, layered as follows"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: tz/policy/tasaf-pssn/pssn-ii-benefit-structure
              excerpt: "subject to compliance with health or education conditionalities"
    versions:
      - effective_from: '2019-08-16'
        formula: |-
          if household_receives_cash_transfer:
            min(
              household_cash_transfer_maximum,
              max(
                household_cash_transfer_minimum,
                fixed_direct_support_or_productive_transfer
                + (if household_has_child_under_18: child_grant else: 0)
                + (if household_has_member_with_disability: disability_grant else: 0)
                + (if household_has_compliant_child_aged_0_to_5: infant_human_capital_transfer else: 0)
                + min(
                    primary_human_capital_transfer_cap,
                    lower_primary_children_compliant_with_attendance * lower_primary_child_human_capital_transfer
                    + upper_primary_children_compliant_with_attendance * upper_primary_child_human_capital_transfer
                  )
                + min(
                    secondary_human_capital_transfer_cap,
                    lower_secondary_children_compliant_with_attendance * lower_secondary_child_human_capital_transfer
                    + upper_secondary_children_compliant_with_attendance * upper_secondary_child_human_capital_transfer
                  )
              )
            )
          else: 0

  - name: standard_monthly_public_works_transfer
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: TZS
    source: PSSN II Table 2, Public Works transfer
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: tz/policy/tasaf-pssn/pssn-ii-benefit-structure
              excerpt: "Public Works transfer 3000*10 = 30,000"
    versions:
      - effective_from: '2019-08-16'
        formula: |-
          if household_participates_in_public_works:
            public_works_daily_transfer * standard_public_works_payment_days
          else: 0

  - name: livelihood_grant_payable
    kind: derived
    entity: Household
    dtype: Money
    unit: TZS
    source: PSSN II paragraph 44, Livelihood grant
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: tz/policy/tasaf-pssn/pssn-ii-benefit-structure
              excerpt: "participated regularly in training sessions, are economically active, have accumulated some savings and developed a viable business plan"
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: tz/policy/tasaf-pssn/pssn-ii-benefit-structure
              excerpt: "will not exceed TZS 500,000"
    versions:
      - effective_from: '2019-08-16'
        formula: |-
          if household_participated_regularly_in_training
             and household_is_economically_active
             and household_has_accumulated_savings
             and household_has_viable_business_plan:
            maximum_livelihood_grant
          else: 0
