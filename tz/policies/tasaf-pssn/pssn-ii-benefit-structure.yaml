format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: tz/policy/tasaf-pssn/pssn-ii-benefit-structure
    source_sha256: 6df512a6ccd7ec81af5200489a4201a1318f6d429b40c380e8c100401a8cdfba
  summary: 'Table 2: Proposed Benefit Structure under PSSN II per month. Fixed Direct support/Productive transfer: 12,000 TZS, cap 12,000. Fixed Child grant: 5,000 TZS, cap 5,000. Fixed Disability grant: 5,000 TZS, cap 5,000. Fixed HCT Infant: 5,000 TZS, cap 5,000. Variable HCT Child lower primary (1-4): 2,000 TZS; Child upper primary (5-7): 4,000 TZS; primary cap 12,000. Variable HCT Child lower secondary: 6,000 TZS; Child high secondary: 8,000 TZS; secondary cap 16,000. Minimum 12,000; Maximum 55,000. Public Works transfer 3000*10 = 30,000. Livelihood grant 500,000.'
  deferred_outputs:
  - output: tz:policies/tasaf-pssn/pssn-ii-benefit-structure(b)#goods_works_non_consulting_services_consultants_services_training_and_operating_costs
    reason: The checklist item cites a financing/disbursement cost category, but the source slice does not state a beneficiary-level executable entitlement, eligibility condition, or formula for that administrative cost category beyond project financing allocation context.
