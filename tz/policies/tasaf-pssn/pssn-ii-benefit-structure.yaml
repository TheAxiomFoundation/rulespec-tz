- name: monthly_foundational_cash_transfer_before_overall_cap
  kind: derived
  entity: Household
  dtype: Money
  period: Month
  unit: TZS
  source: tz/policy/tasaf-pssn/pssn-ii-benefit-structure
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: tz/policy/tasaf-pssn/pssn-ii-benefit-structure
          excerpt: three types of benefits
  versions:
  - effective_from: '2019-08-16'
    formula: |-
      (if household_receives_direct_support_or_productive_transfer: min(direct_support_or_productive_transfer_amount, direct_support_or_productive_transfer_cap) else: 0)
      + (if household_includes_child_under_18: min(child_grant_amount, child_grant_cap) else: 0)
      + (if household_includes_person_with_disability: min(disability_grant_amount, disability_grant_cap) else: 0)
      + (if household_has_compliant_child_aged_0_to_5: min(infant_human_capital_transfer_amount, infant_human_capital_transfer_cap) else: 0)
      + min(primary_human_capital_transfer_cap, (lower_primary_child_count_with_required_attendance * lower_primary_child_human_capital_transfer_amount) + (upper_primary_child_count_with_required_attendance * upper_primary_child_human_capital_transfer_amount))
      + min(secondary_human_capital_transfer_cap, (lower_secondary_child_count_with_required_attendance * lower_secondary_child_human_capital_transfer_amount) + (upper_secondary_child_count_with_required_attendance * upper_secondary_child_human_capital_transfer_amount))
- name: monthly_foundational_cash_transfer
  kind: derived
  entity: Household
  dtype: Money
  period: Month
  unit: TZS
  source: tz/policy/tasaf-pssn/pssn-ii-benefit-structure
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: tz/policy/tasaf-pssn/pssn-ii-benefit-structure
          excerpt: minimum of TZS 12,000
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: tz/policy/tasaf-pssn/pssn-ii-benefit-structure
          excerpt: maximum of TZS 55,000
  versions:
  - effective_from: '2019-08-16'
    formula: min(monthly_cash_transfer_maximum, max(monthly_cash_transfer_minimum, monthly_foundational_cash_transfer_before_overall_cap))
- name: monthly_cash_plus_public_works_transfer
  kind: derived
  entity: Household
  dtype: Money
  period: Month
  unit: TZS
  source: tz/policy/tasaf-pssn/pssn-ii-benefit-structure
  metadata:
    proof:
